# CI gate to catch leaked secrets/credentials in the OSS repo.
#
# Scans every push and PR for common secret patterns: API keys, tokens,
# hardcoded passwords, private keys, .env files with real values, and
# connection strings with embedded credentials.
#
# Uses simple grep patterns — no external tools required.

name: Secret Leak Scan

on:
  push:
    branches: [main]
  pull_request:

jobs:
  secret-leak-scan:
    name: Scan for leaked secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scan for secrets and credentials
        shell: bash
        run: |
          set -euo pipefail

          FAILED=0

          # ── Helper ──────────────────────────────────────────────────────
          # scan PATTERN DESCRIPTION [FILE_GLOB...]
          # Greps tracked files for the given pattern. Excludes lockfiles,
          # node_modules, .git, and this workflow file itself to avoid
          # false positives on the pattern definitions.
          scan() {
            local pattern="$1"
            local description="$2"

            HITS="$(grep -rn \
              --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=docker \
              --exclude=package-lock.json --exclude=pnpm-lock.yaml --exclude=yarn.lock \
              --exclude=secret-leak-scan.yml --exclude=ci.yml \
              --exclude=docker-compose.yml --exclude=docker-compose.agents.yml \
              --exclude='.env.example' --exclude=DEPLOYMENT.md \
              -E "$pattern" . 2>/dev/null \
              || true)"

            if [[ -n "$HITS" ]]; then
              if [[ $FAILED -eq 0 ]]; then
                echo "::error::Potential secrets detected in repository!"
                echo ""
              fi
              FAILED=1
              echo "FAIL  $description"
              echo "$HITS" | head -20 | sed 's/^/        /'
              local count
              count="$(echo "$HITS" | wc -l | xargs)"
              if [[ $count -gt 20 ]]; then
                echo "        ... and $((count - 20)) more matches"
              fi
              echo ""
            fi
          }

          echo "=== Secret Leak Scan ==="
          echo ""

          # ── API key prefixes ────────────────────────────────────────────
          # Linear API tokens
          scan 'lin_api_[A-Za-z0-9]{10,}'          "Linear API token (lin_api_...)"

          # OpenAI / LLM API keys
          scan 'sk-[A-Za-z0-9]{20,}'               "OpenAI/LLM secret key (sk-...)"

          # GitHub personal access tokens
          scan 'ghp_[A-Za-z0-9]{36,}'               "GitHub personal access token (ghp_...)"

          # GitHub server-to-server tokens
          scan 'ghs_[A-Za-z0-9]{36,}'               "GitHub server token (ghs_...)"

          # GitHub fine-grained tokens
          scan 'github_pat_[A-Za-z0-9]{22,}'        "GitHub fine-grained PAT"

          # AWS access keys
          scan 'AKIA[0-9A-Z]{16}'                   "AWS access key ID (AKIA...)"

          # Slack tokens
          scan 'xoxb-[0-9]{10,}-[A-Za-z0-9]+'      "Slack bot token (xoxb-...)"
          scan 'xoxp-[0-9]{10,}-[A-Za-z0-9]+'      "Slack user token (xoxp-...)"

          # Stripe keys
          scan 'sk_live_[A-Za-z0-9]{24,}'           "Stripe live secret key"
          scan 'rk_live_[A-Za-z0-9]{24,}'           "Stripe live restricted key"

          # Anthropic API keys
          scan 'sk-ant-[A-Za-z0-9]{20,}'            "Anthropic API key"

          # Sendgrid
          scan 'SG\.[A-Za-z0-9_-]{22}\.[A-Za-z0-9_-]{43}' "SendGrid API key"

          # ── Hardcoded credentials ───────────────────────────────────────
          # Match password/secret/token assignments with actual values
          # (not placeholders like "changeme", "xxx", "YOUR_...", empty strings)
          scan 'password\s*[:=]\s*["\x27][^"\x27]{8,}["\x27]'  "Hardcoded password value"
          scan 'secret\s*[:=]\s*["\x27][^"\x27]{8,}["\x27]'    "Hardcoded secret value"
          scan 'api_key\s*[:=]\s*["\x27][^"\x27]{8,}["\x27]'   "Hardcoded API key value"

          # ── Private key material ────────────────────────────────────────
          scan 'BEGIN (RSA |EC |DSA |OPENSSH )?PRIVATE KEY'     "Private key material"

          # ── .env files with real values ─────────────────────────────────
          # Check if any .env files exist (they should be gitignored)
          ENV_FILES="$(find . -name '.env' -o -name '.env.local' -o -name '.env.production' \
            -not -path './.git/*' -not -path './node_modules/*' 2>/dev/null || true)"
          if [[ -n "$ENV_FILES" ]]; then
            # Only flag .env files that contain actual values (not just comments/blanks)
            for envfile in $ENV_FILES; do
              HAS_VALUES="$(grep -E '^[A-Z_]+=.+' "$envfile" 2>/dev/null \
                | grep -v -E '=(your_|changeme|xxx|placeholder|TODO|FIXME)' \
                || true)"
              if [[ -n "$HAS_VALUES" ]]; then
                if [[ $FAILED -eq 0 ]]; then
                  echo "::error::Potential secrets detected in repository!"
                  echo ""
                fi
                FAILED=1
                echo "FAIL  .env file with real values: $envfile"
                echo "$HAS_VALUES" | head -5 | sed 's/=.*/=<REDACTED>/' | sed 's/^/        /'
                echo ""
              fi
            done
          fi

          # ── Connection strings with embedded credentials ────────────────
          scan 'postgres(ql)?://[^:]+:[^@]+@'       "PostgreSQL connection string with password"
          scan 'mongodb(\+srv)?://[^:]+:[^@]+@'     "MongoDB connection string with password"
          scan 'redis://:[^@]+@'                     "Redis connection string with password"
          scan 'amqp://[^:]+:[^@]+@'                "AMQP connection string with password"
          scan 'mysql://[^:]+:[^@]+@'               "MySQL connection string with password"

          # ── Summary ─────────────────────────────────────────────────────
          if [[ $FAILED -eq 1 ]]; then
            echo "::error::BLOCKED: Potential secrets/credentials detected. See above for details."
            echo ""
            echo "If these are false positives (e.g. example patterns in docs),"
            echo "update the scan patterns in .github/workflows/secret-leak-scan.yml"
            exit 1
          fi

          echo "PASS  No secrets or credentials detected."
