# Data Workers Agent Swarm
# All 14 agents deployed as individual services.
# Depends on infrastructure from the root docker-compose.yml.
#
# Usage: docker compose -f docker-compose.yml -f docker/docker-compose.agents.yml up -d

x-agent-defaults: &agent-defaults
  build:
    context: ..
    dockerfile: docker/Dockerfile.agent
  restart: unless-stopped
  networks:
    - dw-network
  depends_on:
    redis:
      condition: service_healthy
    postgres:
      condition: service_healthy
  environment: &agent-env
    NODE_ENV: production
    # Factory-pattern env vars (matches DEPLOYMENT.md)
    DATABASE_URL: postgresql://dw_user:dw_local_dev@postgres:5432/data_workers
    REDIS_URL: redis://redis:6379
    NEO4J_URI: bolt://neo4j:7687
    NEO4J_PASSWORD: dw_local_dev
    KAFKA_BROKERS: kafka:9092
    PGVECTOR_ENABLED: "true"
    PG_FTS_ENABLED: "true"

services:
  # ---- Core Agents ----

  dw-pipelines:
    <<: *agent-defaults
    container_name: dw-pipelines
    ports: ["3001:3000"]
    environment:
      <<: *agent-env
      DW_AGENT_NAME: dw-pipelines

  dw-incidents:
    <<: *agent-defaults
    container_name: dw-incidents
    ports: ["3002:3000"]
    environment:
      <<: *agent-env
      DW_AGENT_NAME: dw-incidents

  dw-context-catalog:
    <<: *agent-defaults
    container_name: dw-context-catalog
    ports: ["3003:3000"]
    environment:
      <<: *agent-env
      DW_AGENT_NAME: dw-context-catalog

  dw-cost:
    <<: *agent-defaults
    container_name: dw-cost
    ports: ["3004:3000"]
    environment:
      <<: *agent-env
      DW_AGENT_NAME: dw-cost

  dw-governance:
    <<: *agent-defaults
    container_name: dw-governance
    ports: ["3005:3000"]
    environment:
      <<: *agent-env
      DW_AGENT_NAME: dw-governance

  dw-migration:
    <<: *agent-defaults
    container_name: dw-migration
    ports: ["3006:3000"]
    environment:
      <<: *agent-env
      DW_AGENT_NAME: dw-migration

  dw-insights:
    <<: *agent-defaults
    container_name: dw-insights
    ports: ["3007:3000"]
    environment:
      <<: *agent-env
      DW_AGENT_NAME: dw-insights

  dw-observability:
    <<: *agent-defaults
    container_name: dw-observability
    ports: ["3008:3000"]
    environment:
      <<: *agent-env
      DW_AGENT_NAME: dw-observability

  dw-streaming:
    <<: *agent-defaults
    container_name: dw-streaming
    ports: ["3009:3000"]
    environment:
      <<: *agent-env
      DW_AGENT_NAME: dw-streaming

  dw-orchestration:
    <<: *agent-defaults
    container_name: dw-orchestration
    ports: ["3010:3000"]
    environment:
      <<: *agent-env
      DW_AGENT_NAME: dw-orchestration

  dw-schema:
    <<: *agent-defaults
    container_name: dw-schema
    ports: ["3011:3000"]
    environment:
      <<: *agent-env
      DW_AGENT_NAME: dw-schema

  dw-quality:
    <<: *agent-defaults
    container_name: dw-quality
    ports: ["3012:3000"]
    environment:
      <<: *agent-env
      DW_AGENT_NAME: dw-quality

  # ---- Connector Agents ----

  dw-connectors:
    <<: *agent-defaults
    container_name: dw-connectors
    ports: ["3013:3000"]
    environment:
      <<: *agent-env
      DW_AGENT_NAME: dw-connectors

  dw-usage-intelligence:
    <<: *agent-defaults
    container_name: dw-usage-intelligence
    ports: ["3014:3000"]
    environment:
      <<: *agent-env
      DW_AGENT_NAME: dw-usage-intelligence

  # ---- Infrastructure (defined here for standalone use) ----

  redis:
    image: redis:7-alpine
    container_name: dw-redis
    ports: ["6379:6379"]
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - dw-network

  postgres:
    image: ankane/pgvector:v0.8.0-pg16
    container_name: dw-postgres
    ports: ["5432:5432"]
    environment:
      POSTGRES_DB: data_workers
      POSTGRES_USER: dw_user
      POSTGRES_PASSWORD: dw_local_dev
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dw_user -d data_workers"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - dw-network

  neo4j:
    image: neo4j:5-community
    container_name: dw-neo4j
    ports: ["7474:7474", "7687:7687"]
    environment:
      NEO4J_AUTH: neo4j/dw_local_dev
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - dw-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: dw-kafka
    ports: ["9092:9092"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: data-workers-dev
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - dw-network

volumes:
  redis-data:
  postgres-data:
  neo4j-data:

networks:
  dw-network:
    driver: bridge
