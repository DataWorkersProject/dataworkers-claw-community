[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "data-workers"
version = "0.1.0"
description = "Python SDK for Data Workers — autonomous agent swarm for data engineering"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "Data Workers, Inc.", email = "hello@dataworkers.io" },
]
keywords = ["data-engineering", "agents", "mcp", "data-workers"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries",
]
dependencies = [
    "httpx>=0.25.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "mypy>=1.0",
    "ruff>=0.1",
]

[project.urls]
Homepage = "https://github.com/DataWorkersProject/dataworkers-claw-community"
Repository = "https://github.com/DataWorkersProject/dataworkers-claw-community"
Issues = "https://github.com/DataWorkersProject/dataworkers-claw-community/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/data_workers"]

[tool.mypy]
python_version = "3.10"
strict = true

[tool.ruff]
target-version = "py310"
line-length = 100
